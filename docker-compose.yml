services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  popup-service:
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: development
      BASE_URL: http://localhost:3000
      REDIS_URL: redis://redis:6379
      ACCESS_TOKEN_SECRET: dev-access-token-secret-change-in-prod
      INVITE_TOKEN_SECRET: dev-invite-token-secret-change-in-prod
      APPROVAL_TOKEN_SECRET: dev-approval-token-secret-change-prod
      ADMIN_TOKEN: dev-admin-token
      HEALTH_CHECK_INTERVAL_MS: 60000
      HEALTH_CHECK_TIMEOUT_MS: 5000
    depends_on:
      redis:
        condition: service_healthy

  demo-popup-connector:
    build:
      context: ./demo-popup-connector
    ports:
      - "4000:4000"
    environment:
      PX_PORT: 4000
      POPUP_SERVICE_URL: http://popup-service:3000
      PX_NAMESPACE: test-x
      PX_DISPLAY_NAME: Test X Service
      PX_CONTACT_EMAIL: test@example.com
      NODE_ENV: production
    depends_on:
      - popup-service

  twitter-popup-connector:
    build:
      context: .
      dockerfile: Dockerfile.twitter.railway
    ports:
      - "4100:4100"
    environment:
      TX_PORT: 4100
      TX_BASE_URL: http://localhost:4100
      POPUP_SERVICE_URL: http://popup-service:3000
      TX_NAMESPACE: x-twitter
      TX_DISPLAY_NAME: X (Twitter) Connector
      TX_CONTACT_EMAIL: admin@example.com
      TWITTER_API_KEY: ${TWITTER_API_KEY}
      TWITTER_API_SECRET: ${TWITTER_API_SECRET}
      TWITTER_ACCESS_TOKEN: ${TWITTER_ACCESS_TOKEN}
      TWITTER_ACCESS_SECRET: ${TWITTER_ACCESS_SECRET}
      TWITTER_BOT_USERNAME: ${TWITTER_BOT_USERNAME:-ConvosConnect}
      TWITTER_OAUTH_CLIENT_ID: ${TWITTER_OAUTH_CLIENT_ID}
      TWITTER_OAUTH_CLIENT_SECRET: ${TWITTER_OAUTH_CLIENT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NODE_ENV: production
    depends_on:
      - popup-service
