services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  popup-service:
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: development
      BASE_URL: http://localhost:3000
      REDIS_URL: redis://redis:6379
      ACCESS_TOKEN_SECRET: dev-access-token-secret-change-in-prod
      INVITE_TOKEN_SECRET: dev-invite-token-secret-change-in-prod
      APPROVAL_TOKEN_SECRET: dev-approval-token-secret-change-prod
      ADMIN_TOKEN: dev-admin-token
      HEALTH_CHECK_INTERVAL_MS: 60000
      HEALTH_CHECK_TIMEOUT_MS: 5000
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s

  twitter-tester:
    build:
      context: .
      dockerfile: Dockerfile.tester
    ports:
      - "4200:4200"
    environment:
      TESTER_PORT: 4200
      TWITTER_BOT_USERNAME: ${TWITTER_BOT_USERNAME:-ConvosConnect}

  twitter-popup-connector:
    build:
      context: .
      dockerfile: Dockerfile.twitter.railway
    ports:
      - "4100:4100"
    environment:
      TX_PORT: 4100
      TX_BASE_URL: http://localhost:4100
      TX_APP_ICON_URL: http://twitter-popup-connector:4100/app-icon.jpg
      POPUP_SERVICE_URL: http://popup-service:3000
      TX_NAMESPACE: x-twitter
      TX_DISPLAY_NAME: X (Twitter) Connector
      TX_CONTACT_EMAIL: admin@example.com
      TWITTER_BOT_USERNAME: ${TWITTER_BOT_USERNAME:-ConvosConnect}
      TWITTER_API_BASE_URL: http://twitter-tester:4200
      TWITTER_OAUTH_BASE_URL: http://localhost:4200
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NODE_ENV: development
    depends_on:
      popup-service:
        condition: service_healthy
      twitter-tester:
        condition: service_started
